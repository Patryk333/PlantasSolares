<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <!-- Logo -->
    <a class="navbar-brand fw-bold" routerLink="/">
      MiWeb
    </a>

    <!-- Botón hamburguesa -->
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarHeader"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Menú -->
    <div class="collapse navbar-collapse" id="navbarHeader">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0">

        <li class="nav-item">
          <a class="nav-link" [routerLink]="['home']">
            Inicio
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" [routerLink]="['plantas']">
            Plantas
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link"  [routerLink]="['administrador']">Administrador</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" [routerLink]="['register']">
            Register
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" [routerLink]="['login']">
            Login
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" (click)="$event.preventDefault(); logout()">Logout</a>
        </li>
      </ul>
      @if (session() != null) {
        <span class="navbar-text">
          Logged in as {{ session()?.user?.email }}
        </span>
      }
      <form class="d-flex" role="search">
        <input class="form-control me-2" 
        type="search" placeholder="Search" 
        aria-label="Search"
        [(ngModel)]="searchString"
        [ngModelOptions]="{standalone: true}"
        (ngModelChange)="search(searchString)"/>
        <button class="btn btn-outline-success" type="submit" (click)="setSearch()">Search</button>
      </form>

    </div>
  </div>
</nav>
