<div class="container">
<table class="table table-striped table-hover">
  <thead>
    <tr>
      <th scope="col">Nom</th>
      <th scope="col">Ubicació</th>
      <th scope="col">Usuari</th>
      <th scope="col">Capacitat</th>
      <th scope="col">Accions</th>
    </tr>
  </thead>
  <tbody>
    @for(planta of plantes(); track planta.id){
        <tr app-plantas-row [plantaId]="planta" (action)="action.emit($event)"></tr>
    }
    
  </tbody>
</table>

</div>
